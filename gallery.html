<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Richman Matric Hr. Sec. School</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/phosphor-icons"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-header { background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light)); color: white; padding: 100px 0 60px; text-align: center; margin-bottom: 60px; }
        .page-header h1 { color: white; font-size: 3.5rem; margin-bottom: 15px; }
        .full-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .full-gallery img { width: 100%; height: 300px; object-fit: cover; border-radius: 12px; transition: transform 0.4s; cursor: pointer; }
        .full-gallery img:hover { transform: scale(1.05); box-shadow: var(--shadow-xl); z-index: 10; position:relative; }
        .filter-btns { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .filter-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid var(--color-primary); background: transparent; color: var(--color-primary); font-weight: 600; cursor: pointer; transition: 0.3s; }
        .filter-btn.active, .filter-btn:hover { background: var(--color-primary); color: white; }
    </style>
</head>
<body>

    <div class="app-container">

        <nav class="navbar" id="navbar">
            <div class="container nav-inner">
                 <div style="font-family:'Outfit'; font-weight:800; font-size:1.5rem; color:var(--color-primary); display:flex; align-items:center; gap:10px;">
                    <i class="ph ph-planet"></i> RICHMAN MATRIC HR. SEC. SCHOOL
                </div>
                <ul class="nav-links">
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="academics.html">ACADEMICS</a></li>
                    <li><a href="sports.html">SPORTS</a></li>
                    <li><a href="facilities.html">FACILITIES</a></li>
                    <li><a href="gallery.html" class="active">GALLERY</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                </ul>
            </div>
        </nav>

        <header class="page-header">
            <div class="container relative">
                <h1 class="animate-up">Campus Gallery</h1>
                <p class="animate-up delay-1" style="font-size:1.2rem; opacity:0.9;">A glimpse into life at Richman Matric Hr. Sec. School.</p>
            </div>
        </header>

        <main class="container mb-lg reveal">
            
            <div class="filter-btns">
                <button class="filter-btn active" data-filter="all">All Photos</button>
                <button class="filter-btn" data-filter="sports">Sports</button>
                <button class="filter-btn" data-filter="academics">Academics</button>
                <button class="filter-btn" data-filter="campus">Campus Life</button>
            </div>

            <div class="full-gallery" id="gallery-container">
                <!-- Academics -->
                <img src="assets/campus_classroom.png" alt="Students in class" class="gallery-item" data-category="academics">
                <img src="assets/campus_science_lab.png" alt="Science Lab" class="gallery-item" data-category="academics">
                
                <!-- Sports -->
                <img src="assets/gallery_sports_day.png" alt="Sports Day" class="gallery-item" data-category="sports">
                <img src="assets/school_cricket.png" alt="Cricket Team" class="gallery-item" data-category="sports">
                <img src="assets/gallery_football_match.png" alt="Football Match" class="gallery-item" data-category="sports">
                <img src="assets/gallery_training.png" alt="Sports Training" class="gallery-item" data-category="sports">
                <img src="assets/gallery_prize.png" alt="Prize Distribution" class="gallery-item" data-category="sports">
                <img src="assets/school_athletics.png" alt="Athletics" class="gallery-item" data-category="sports">
                
                <!-- Campus Life -->
                <img src="assets/campus_graduation.png" alt="Graduation Event" class="gallery-item" data-category="campus">
                <img src="assets/campus_basketball.png" alt="Basketball Game" class="gallery-item" data-category="campus">
                <img src="assets/school_playground.png" alt="Playground" class="gallery-item" data-category="campus">
                <img src="assets/school_badminton.png" alt="Badminton" class="gallery-item" data-category="campus">
            </div>
            
            <div style="text-align:center; margin-top:50px;">
                <button class="btn btn-primary" onclick="alert('Loading more images...')">Load More</button>
            </div>

        </main>

        <footer class="footer">
            <div class="container footer-grid">
                <div class="footer-brand">
                    <div class="logo-icon white"><i class="ph ph-planet"></i></div>
                    <h3>Richman Matric Hr. Sec. School</h3>
                </div>
            </div>
            <div class="footer-bottom">
                &copy; 2026 Richman Matric Hr. Sec. School.
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
    <script>
        // Load gallery images from backend API
        async function loadGalleryFromAPI() {
            try {
                const response = await fetch('/api/gallery');
                const gallery = await response.json();
                const container = document.getElementById('gallery-container');
                gallery.forEach(item => {
                    const img = document.createElement('img');
                    img.src = item.img;
                    img.alt = item.title;
                    img.className = 'gallery-item';
                    img.dataset.category = (item.category || 'campus').toLowerCase();
                    img.onerror = function() { this.style.display = 'none'; };
                    container.appendChild(img);
                });
            } catch (err) {
                console.log('Could not load gallery from API:', err);
            }
        }
        loadGalleryFromAPI();

        // Filter buttons
        document.addEventListener('DOMContentLoaded', () => {
            const filterBtns = document.querySelectorAll('.filter-btn');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const filterValue = btn.getAttribute('data-filter');
                    const galleryItems = document.querySelectorAll('.gallery-item');
                    
                    galleryItems.forEach(item => {
                        if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
                            item.style.display = 'block';
                        } else {
                            item.style.display = 'none';
                        }
                    });
                });
            });
        });
    </script>
</body>
</html>
